# .github/workflows/docker-image.yml
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Instalar dependencias
      run: pip install -r requirements.txt coverage
    - name: Ejecutar pruebas y métricas
      run: |
        coverage run -m unittest test_calculadora.py
        coverage report -m

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.shinyakougami }}
        password: ${{ secrets.ShinyaKougam1 }}
    - name: Construir y subir imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: shinyakougami/mi-calculadora:latest